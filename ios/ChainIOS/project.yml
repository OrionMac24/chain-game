name: ChainIOS
options:
  bundleIdPrefix: com.chainwordgame
  deploymentTarget:
    iOS: "15.0"
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.81.1
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 13.6.0
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: 3.0.0
targets:
  ChainIOS:
    type: application
    platform: iOS
    attributes:
      SystemCapabilities:
        com.apple.InAppPurchase:
          enabled: 1
    sources:
      - path: ChainIOS
        excludes:
          - Web
    resources:
      - path: ChainIOS/Web
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
        product: UserMessagingPlatform
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chainwordgame.app
        PRODUCT_NAME: CHAIN
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CHAIN
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ChainIOS/ChainIOS.entitlements
