name: Validate CHAIN

on:
  pull_request:
  workflow_dispatch:

jobs:
  web-and-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: for file in js/*.js; do node --check "$file"; done
      - name: Verify board constraints and collision rule
        run: node work/verify-boards.js
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Android debug app
        working-directory: android/ChainAndroid
        run: ./gradlew assembleDebug
